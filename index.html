<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATTEND">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="ATTEND">
<link rel="manifest" href="data:application/json;charset=utf-8,{
  &quot;name&quot;: &quot;ATTEND — Finance Team&quot;,

  &quot;start_url&quot;: &quot;.&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;orientation&quot;: &quot;portrait&quot;,
  &quot;background_color&quot;: &quot;#1a1a2e&quot;,
  &quot;theme_color&quot;: &quot;#1a1a2e&quot;,
  &quot;icons&quot;: [
    { &quot;src&quot;: &quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%231a1a2e'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='280' font-family='sans-serif' fill='%235c7cfa'%3E⬡%3C/text%3E%3Ctext x='256' y='430' text-anchor='middle' font-size='80' font-family='sans-serif' font-weight='bold' fill='%23e8eaf6'%3EATTEND%3C/text%3E%3C/svg%3E&quot;, &quot;sizes&quot;: &quot;512x512&quot;, &quot;type&quot;: &quot;image/svg+xml&quot;, &quot;purpose&quot;: &quot;any maskable&quot; }
  ]
}">
<title>ATTEND — Finance Team</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #222240;
  --surface2: #2a2a50;
  --border: #363660;
  --text: #e8eaf6;
  --text2: #9fa8c4;
  --text3: #6b74a0;
  --accent: #5c7cfa;
  --accent2: #91a7ff;
  --gold: #ffc947;
  --green: #69db7c;
  --red: #ff6b6b;
  --purple: #cc5de8;
  --cyan: #38d9a9;
  --radius: 14px;
  --topbar-h: 58px;
  --bottomnav-h: 68px;
  --drawer-w: 270px;

  /* 가시성 핵심 변수 */
  --fs-xs: 11px;
  --fs-sm: 13px;
  --fs-md: 15px;
  --fs-lg: 17px;
  --fs-xl: 22px;
  --lh: 1.6;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  overscroll-behavior: none;
  font-size: var(--fs-md);
  line-height: var(--lh);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

/* ═══════════════════════════════
   LOGIN
═══════════════════════════════ */
#loginScreen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; padding: 20px;
  background: var(--bg);
  overflow-y: auto;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  width: 100%; max-width: 380px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  text-align: center;
}
.login-logo {
  font-family: 'Syne', sans-serif;
  font-size: 11px; letter-spacing: 0.3em;
  color: var(--text2); margin-bottom: 24px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-hex { font-size: 20px; color: var(--gold); }
.login-title {
  font-family: 'Syne', sans-serif;
  font-size: 30px; font-weight: 800;
  line-height: 1.1; margin-bottom: 8px;
  background: linear-gradient(135deg, #e8eaf6, #9fa8c4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; line-height: 1.6; }
.ms-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 15px 20px;
  background: #2563eb; color: #fff;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; touch-action: manipulation;
}
.ms-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.config-section { margin-top: 24px; text-align: left; }
.config-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 5px; }
.config-input {
  width: 100%; padding: 10px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-size: 12px; font-family: 'Courier New', monospace;
  outline: none; margin-bottom: 8px;
}
.config-input:focus { border-color: var(--accent); }
.config-input::placeholder { color: var(--text3); }
.demo-btn {
  width: 100%; padding: 13px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2);
  font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 10px;
  touch-action: manipulation;
}
.login-note { font-size: 10px; color: var(--text3); margin-top: 16px; line-height: 1.7; }

/* ═══════════════════════════════
   APP SHELL
═══════════════════════════════ */
#appShell { display: none; height: 100%; position: relative; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  backdrop-filter: blur(2px);
  transition: opacity 0.25s;
}
.drawer-overlay.open { display: block; }

/* ── DRAWER ── */
.drawer {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--drawer-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 300;
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.drawer-logo {
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
  display: flex; align-items: center; gap: 8px;
}
.drawer-hex { color: var(--gold); font-size: 18px; }
.drawer-close {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--surface2); border: none; color: var(--text2);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}

.drawer-user {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.drawer-avatar {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, #5c7cfa, #cc5de8);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.drawer-username { font-size: 15px; font-weight: 700; }
.drawer-role { font-size: 12px; color: var(--text2); margin-top: 2px; }

.drawer-nav { padding: 12px; flex: 1; }
.nav-section-label {
  font-size: 11px; color: var(--text3); letter-spacing: 0.1em;
  padding: 0 8px; margin: 14px 0 6px; font-weight: 600;
}
.nav-btn {
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 12px 14px;
  border-radius: 10px; border: none;
  background: transparent; color: var(--text2);
  font-size: 14px; cursor: pointer; text-align: left;
  transition: background 0.15s; font-family: inherit;
  touch-action: manipulation; line-height: 1.4;
}
.nav-btn:active { background: var(--surface2); }
.nav-btn.active { background: var(--accent); color: #fff; font-weight: 700; }
.nav-icon { font-size: 16px; width: 22px; text-align: center; }

.drawer-footer {
  padding: 16px 18px;
  border-top: 1px solid var(--border);
}
.sync-time { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
.drawer-sync-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 12px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit;
  margin-bottom: 8px; touch-action: manipulation; font-weight: 600;
}
.drawer-sync-btn.syncing { color: var(--gold); border-color: rgba(245,158,11,0.4); }
.drawer-logout-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 12px; border-radius: 10px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text3); font-size: 13px; cursor: pointer; font-family: inherit;
  touch-action: manipulation;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
  z-index: 100;
}
.menu-btn {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--surface2); border: none; color: var(--text);
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; touch-action: manipulation;
}
.topbar-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; flex: 1; }
.topbar-sync {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; transition: all 0.2s;
}
.topbar-sync.syncing { color: var(--gold); border-color: rgba(245,158,11,0.4); animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.topbar-badge {
  font-size: 11px; padding: 4px 12px;
  background: var(--surface2); border-radius: 20px; color: var(--text2);
  border: 1px solid var(--border); white-space: nowrap; font-weight: 600;
}
.topbar-badge.live { color: var(--green); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.08); }

/* ── MAIN SCROLL ── */
.main-scroll {
  position: fixed;
  top: var(--topbar-h);
  left: 0; right: 0;
  bottom: var(--bottomnav-h);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bottomnav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(5, 1fr);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; border: none; background: transparent;
  color: var(--text3); cursor: pointer; font-family: inherit;
  touch-action: manipulation; transition: color 0.15s;
  padding: 8px 4px;
}
.bnav-btn.active { color: var(--accent); }
.bnav-icon { font-size: 22px; line-height: 1; }
.bnav-label { font-size: 11px; font-weight: 600; }

/* ═══════════════════════════════
   PAGE ELEMENTS
═══════════════════════════════ */
.page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.02em; }
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }

/* Summary strip — 2 rows of 3 on mobile */
.summary-strip {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.s-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 8px; text-align: center;
  cursor: pointer; position: relative; overflow: hidden;
  touch-action: manipulation;
}
.s-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.s-card.active { border-color: currentColor; }
.s-count { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; }
.s-label { font-size:11px; color:var(--text2); margin-top:3px; font-weight:600; }

/* Member cards — 1 col on mobile */
.member-grid { display: flex; flex-direction: column; gap: 10px; }
.m-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
}
.m-card-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.m-avatar {
  width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.m-name { font-size: 15px; font-weight: 700; }
.m-role { font-size: 12px; color: var(--text2); margin-top: 2px; }
.m-status-badge { border-radius: 6px; padding: 4px 12px; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-left: auto; }
.m-event-item { display:flex; align-items:center; gap:8px; padding:6px 10px; background:var(--surface2); border-radius:8px; margin-bottom:5px; }
.m-event-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.m-event-text { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.m-edit-btn {
  width:100%; margin-top:10px; padding:9px;
  background:transparent; border:1px solid var(--border);
  border-radius:8px; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit;
  touch-action: manipulation; font-weight:600;
}

/* Filter bar */
.filter-bar {
  display:flex; align-items:center; gap:8px;
  background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2);
  border-radius:8px; padding:8px 12px; margin-bottom:12px; font-size:12px;
}
.filter-clear { background:none; border:none; color:var(--gold); cursor:pointer; font-size:11px; font-weight:700; margin-left:auto; font-family:inherit; }

/* Monthly table wrapper — horizontal scroll */
.table-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow-x:auto; margin-bottom:12px;
  -webkit-overflow-scrolling: touch;
}
table { border-collapse:collapse; white-space:nowrap; }
th,td { padding:7px 4px; }
th { font-size:10px; color:var(--text2); border-bottom:1px solid var(--border); text-align:center; font-weight:600; }
th.th-name { text-align:left; padding-left:12px; width:100px; }
td { font-size:12px; text-align:center; border-bottom:1px solid rgba(36,51,71,0.6); }
td.td-name { text-align:left; padding-left:12px; font-weight:700; }
tr:last-child td { border-bottom:none; }
.t-dot { width:10px; height:10px; border-radius:50%; display:inline-block; cursor:pointer; }
.td-stat { font-weight:800; font-size:13px; }
.t-avatar { width:24px; height:24px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; background:var(--surface2); color:var(--text2); margin-right:6px; vertical-align:middle; }

/* Legend */
.legend { display:flex; flex-wrap:wrap; gap:10px; align-items:center; font-size:11px; color:var(--text2); font-weight:600; }
.leg-item { display:flex; align-items:center; gap:5px; }

/* Member select grid — 2 col on mobile */
.member-select-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.ms-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 12px; text-align:center;
  cursor:pointer; touch-action:manipulation; transition:border 0.15s;
}
.ms-card.active { border-color:var(--accent); }
.ms-big-av { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; margin:0 auto 8px; background:var(--surface2); color:var(--text2); }
.ms-card.active .ms-big-av { background:var(--accent); color:#fff; }
.ms-name { font-size:14px; font-weight:700; }
.ms-role { font-size:11px; color:var(--text2); margin:3px 0 8px; }
.ms-rate { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
.ms-mini { display:flex; gap:7px; justify-content:center; font-size:11px; font-weight:700; flex-wrap:wrap; margin-top:5px; }

/* Detail box */
.detail-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.detail-stat-row { display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
.detail-stat-card { background:var(--surface2); border-radius:8px; padding:8px 12px; text-align:center; flex-shrink:0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-cell { border-radius:5px; padding:4px 2px; text-align:center; }

/* Calendar view */
.ev-item { display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--border); }
.graph-tag { display:inline-flex; align-items:center; gap:3px; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); border-radius:4px; padding:2px 5px; font-size:9px; color:var(--accent2); }

/* ═══════════════════════════════
   MODAL (bottom sheet on mobile)
═══════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.6); z-index:400;
  align-items:flex-end; justify-content:center;
  backdrop-filter:blur(3px);
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); 
  border-radius:20px 20px 0 0;
  border:1px solid var(--border);
  border-bottom:none;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  width:100%; max-width:480px;
  box-shadow:0 -20px 60px rgba(0,0,0,0.4);
  animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.modal-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.modal-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
.modal-date { font-size:13px; color:var(--text2); margin-top:3px; }
.modal-close { background:none; border:none; color:var(--text3); cursor:pointer; font-size:22px; padding:4px; }
.status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.status-opt { padding:12px 6px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-size:14px; cursor:pointer; font-family:inherit; touch-action:manipulation; font-weight:600; }
.note-input { width:100%; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; resize:none; font-family:inherit; outline:none; margin-bottom:14px; line-height:1.5; }
.note-input:focus { border-color:var(--accent); }
.modal-btns { display:flex; gap:8px; }
.btn-cancel { flex:1; padding:14px; background:transparent; border:1px solid var(--border); border-radius:10px; color:var(--text2); cursor:pointer; font-family:inherit; font-size:15px; touch-action:manipulation; }
.btn-save { flex:2; padding:14px; background:var(--accent); border:none; border-radius:10px; color:#fff; cursor:pointer; font-family:inherit; font-size:15px; font-weight:700; touch-action:manipulation; }

/* ─ Toast ─ */
.toast {
  display:none; position:fixed; bottom:calc(var(--bottomnav-h) + 12px); left:50%;
  transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border);
  padding:10px 20px; border-radius:20px; font-size:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4); z-index:500; white-space:nowrap;
}

/* Scrollbar */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* PIN */
.pin-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--border); background: transparent;
  transition: all 0.15s;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span class="login-hex">⬡</span> ATTEND / FINANCE</div>
    <div class="login-title">근태 관리<br>시스템</div>

    <!-- STEP 1: 팀원 선택 -->
    <div id="stepSelect">
      <p class="login-sub">팀원을 선택하세요</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px" id="memberPickGrid"></div>

<script>
// ══════════════════════════
// PIN 인증 시스템
// ══════════════════════════
let pinBuffer = '';
let pinTargetMember = null;
let pinMode = 'enter'; // 'enter' | 'set' | 'confirm'
let pinFirst = '';

function loadPins(){
  try{ return JSON.parse(localStorage.getItem('sl_pins')||'{}'); }catch{ return {}; }
}
function savePins(pins){ localStorage.setItem('sl_pins', JSON.stringify(pins)); }

function buildMemberPicker(){
  const grid = document.getElementById('memberPickGrid');
  if(!grid) return;
  // MEMBERS가 아직 없으면 재시도
  if(typeof MEMBERS === 'undefined' || !MEMBERS || !MEMBERS.length){
    setTimeout(buildMemberPicker, 150);
    return;
  }
  grid.innerHTML = MEMBERS.map(m=>`
    <button onclick="selectMemberForPin(${m.id})" style="padding:10px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation;display:flex;align-items:center;gap:8px">
      <span style="width:28px;height:28px;border-radius:7px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0">${m.av}</span>
      ${m.name}
    </button>`).join('');
}

function selectMemberForPin(id){
  const m = MEMBERS.find(x=>x.id===id);
  if(!m) return;
  pinTargetMember = m;
  pinBuffer = '';
  pinFirst = '';
  const pins = loadPins();
  const hasPin = !!pins[id];

  pinMode = hasPin ? 'enter' : 'set';
  document.getElementById('pinUserName').textContent = m.name;
  document.getElementById('pinUserRole').textContent = m.role;
  document.getElementById('pinLabel').textContent = hasPin ? 'PIN 4자리를 입력하세요' : '새 PIN 4자리를 설정해주세요';
  document.getElementById('pinError').textContent = '';
  updatePinDots();

  document.getElementById('stepSelect').style.display = 'none';
  document.getElementById('stepPin').style.display = 'block';
}

function backToSelect(){
  pinBuffer=''; pinTargetMember=null;
  document.getElementById('stepSelect').style.display = 'block';
  document.getElementById('stepPin').style.display = 'none';
  updatePinDots();
}

function pinInput(n){
  if(pinBuffer.length >= 4) return;
  pinBuffer += String(n);
  updatePinDots();
  if(pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function pinDelete(){
  pinBuffer = pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('pinError').textContent = '';
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const dot = document.getElementById(`pd${i}`);
    if(!dot) continue;
    dot.classList.toggle('filled', i < pinBuffer.length);
    dot.classList.remove('error');
  }
}

function checkPin(){
  const pins = loadPins();
  const id = pinTargetMember.id;

  if(pinMode === 'enter'){
    if(pins[id] === pinBuffer){
      enterOffline(pinTargetMember.name, pinTargetMember.email, id);
    } else {
      // 오류 표시
      for(let i=0;i<4;i++) document.getElementById(`pd${i}`)?.classList.add('error');
      document.getElementById('pinError').textContent = '❌ PIN이 틀렸습니다';
      setTimeout(()=>{ pinBuffer=''; updatePinDots(); document.getElementById('pinError').textContent=''; }, 1000);
    }
  } else if(pinMode === 'set'){
    pinFirst = pinBuffer;
    pinBuffer = '';
    pinMode = 'confirm';
    document.getElementById('pinLabel').textContent = 'PIN을 한 번 더 입력하세요';
    updatePinDots();
  } else if(pinMode === 'confirm'){
    if(pinFirst === pinBuffer){
      pins[id] = pinBuffer;
      savePins(pins);
      showToast('✅ PIN 설정 완료');
      enterOffline(pinTargetMember.name, pinTargetMember.email, id);
    } else {
      for(let i=0;i<4;i++) document.getElementById(`pd${i}`)?.classList.add('error');
      document.getElementById('pinError').textContent = '❌ PIN이 일치하지 않습니다. 다시 설정해주세요';
      setTimeout(()=>{
        pinBuffer=''; pinFirst=''; pinMode='set';
        document.getElementById('pinLabel').textContent='새 PIN 4자리를 설정해주세요';
        updatePinDots();
        document.getElementById('pinError').textContent='';
      }, 1200);
    }
  }
}

function enterOffline(name, email, memberId){
  // 세션 정보만 기기에 저장 (PIN 보안상 필요)
  sessionStorage.setItem('sl_user_name', name);
  sessionStorage.setItem('sl_user_email', email||'');
  sessionStorage.setItem('sl_user_mid', memberId||'');
  currentAccount = { name, email };
  initRecords();
  enterApp(name, email, memberId);
}

function enterWithName(){
  const name = document.getElementById('customName')?.value?.trim();
  if(!name){ showToast('⚠️ 이름을 입력해주세요'); return; }
  enterOffline(name, '', null);
}

  closeDrawer();
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appShell').style.display='none';
  document.getElementById('stepSelect').style.display='block';
  document.getElementById('stepPin').style.display='none';

const today = new Date();
const todayStr = fmt(today);
let viewYear = today.getFullYear();
let viewMonth = today.getMonth(); // 0~11
let records={}, notes={}, graphEvents={};

function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getWorkdays(){
  const days=[], y=viewYear, m=viewMonth, tot=new Date(y,m+1,0).getDate();
  const isFutureMonth = (y > today.getFullYear())||(y===today.getFullYear()&&m>today.getMonth());
  for(let d=1;d<=tot;d++){
    const dt=new Date(y,m,d), ds=fmt(dt);
    // 미래 달이면 주말만 제외, 현재/과거 달이면 오늘까지만
    if(dt.getDay()!==0&&dt.getDay()!==6&&(isFutureMonth||ds<=todayStr))
      days.push({date:ds,day:d,wd:dt.getDay()});
  }
  return days;
}
function getAllDays(){
  const days=[], y=viewYear, m=viewMonth, tot=new Date(y,m+1,0).getDate();
  for(let d=1;d<=tot;d++){const dt=new Date(y,m,d);days.push({date:fmt(dt),day:d,wd:dt.getDay()});}
  return days;
}
function changeMonth(delta){
  viewMonth += delta;
  if(viewMonth > 11){ viewMonth=0; viewYear++; }
  if(viewMonth < 0){ viewMonth=11; viewYear--; }
  // 미래는 다음달까지만
  const maxYear=today.getFullYear(), maxMonth=today.getMonth()+1;
  if(viewYear > maxYear||(viewYear===maxYear&&viewMonth>maxMonth)){
    viewYear=maxYear; viewMonth=maxMonth;
    showToast('ℹ️ 다음 달까지만 조회 가능합니다');
  }
  renderCurrentView();
}
function monthNavHTML(){
  const isMax = viewYear===today.getFullYear()&&viewMonth===today.getMonth()+1;
  const isMin = viewYear===today.getFullYear()-1&&viewMonth===0;
  return `<div style="display:flex;align-items:center;gap:10px">
    <button onclick="changeMonth(-1)" ${isMin?'disabled':''}
      style="width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:${isMin?'var(--text3)':'var(--text)'};font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">←</button>
    <span style="font-size:15px;font-weight:700;min-width:80px;text-align:center">${viewYear}년 ${viewMonth+1}월</span>
    <button onclick="changeMonth(1)" ${isMax?'disabled':''}
      style="width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:${isMax?'var(--text3)':'var(--text)'};font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">→</button>
  </div>`;
}
function initRecords(){
  MEMBERS.forEach(m=>{
    if(!records[m.id]) records[m.id]={};
    if(!graphEvents[m.id]) graphEvents[m.id]=[];
  });
}

function enterDemo(){
  isDemo=true;
  // 데모용 랜덤 데이터 생성
  MEMBERS.forEach(m=>{
    records[m.id]={}; graphEvents[m.id]=[];
    getWorkdays().forEach(({date})=>{
      if(date===todayStr){records[m.id][date]='pending';return;}
      const r=Math.random();
      records[m.id][date]=r<0.7?'present':r<0.82?'remote':r<0.88?'vacation':r<0.93?'late':r<0.97?'business':'absent';
    });
  });
  injectDemo(); enterApp('데모 사용자','demo@demo.com',1);
  showToast('🎯 데모 모드');
}
function injectDemo(){
  const wd=getWorkdays();
  [{mid:2,t:'연차 휴가',tp:'vacation'},{mid:3,t:'서울 출장',tp:'business'},

async function syncGraphData(){

  const tb=document.getElementById('topSyncBtn'), db=document.getElementById('drawerSyncBtn');

  const token=await getToken();
  if(!token){tb.classList.remove('syncing');db.classList.remove('syncing');showToast('❌ 토큰 없음');return;}
  const s=new Date(today.getFullYear(),today.getMonth(),1).toISOString();
  const e=new Date(today.getFullYear(),today.getMonth()+1,0,23,59).toISOString();
  try{
    const res=await fetch(`https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${s}&endDateTime=${e}&$select=subject,start,end,showAs,categories&$top=100`,{headers:{Authorization:`Bearer ${token}`}});
    if(res.ok){
      const d=await res.json();
      const myEmail=currentAccount?.email||'';
      const me=MEMBERS.find(m=>m.email.toLowerCase()===myEmail)||MEMBERS[0];
      processGraphEvents(me.id, d.value||[]);
    }
  }catch(err){ console.log('동기화 오류:', err); }
  document.getElementById('lastSync').textContent=`동기화: ${new Date().toLocaleTimeString('ko-KR')}`;
  tb.classList.remove('syncing'); db.classList.remove('syncing');
  updateSyncBadge(true); showToast('✅ 동기화 완료'); renderCurrentView();

function processGraphEvents(mid, evs){
  graphEvents[mid]=[];
  evs.forEach(ev=>{
    const d=ev.start?.dateTime?.substring(0,10)||ev.start?.date; if(!d)return;
    const t=ev.subject||'', lo=t.toLowerCase();
    let type='meeting';
    if(lo.includes('휴가')||lo.includes('vacation')||lo.includes('연차')||lo.includes('반차'))type='vacation';
    else if(lo.includes('출장')||lo.includes('business trip'))type='business';
    else if(lo.includes('재택')||lo.includes('wfh')||lo.includes('remote'))type='remote';
    else if(lo.includes('병가')||lo.includes('sick'))type='absent';
    graphEvents[mid].push({title:t,date:d,type});
    if(['vacation','business','remote','absent'].includes(type)&&d<=todayStr){ if(!records[mid])records[mid]={}; records[mid][d]=type; }
  });
}

const FB_URL = 'https://sl-attend-default-rtdb.asia-southeast1.firebasedatabase.app';
let fbEventSource = null;

async function loadConfig(){
  try{
    const res = await fetch(`${FB_URL}/config.json`);
    if(!res.ok) return;
    const cfg = await res.json();
    if(cfg) applyConfig(cfg);
  }catch(e){ console.log('config 로드 실패(기본값 사용):', e); }
}

function applyConfig(cfg){
  if(!cfg) return;
  if(cfg.members && Array.isArray(cfg.members)){
    MEMBERS.length=0;
    cfg.members.forEach(m=>MEMBERS.push(m));
    buildMemberPicker();
  }
  if(cfg.statuses){
    cfg.statuses.pending = DEFAULT_STATUSES.pending;
    Object.keys(STATUSES).forEach(k=>delete STATUSES[k]);
    Object.assign(STATUSES, cfg.statuses);
  }
  if(cfg.admins && Array.isArray(cfg.admins)){
    ADMINS.length=0;
    cfg.admins.forEach(a=>ADMINS.push(a));
  }
}

function applyFirebaseData(data){
  MEMBERS.forEach(m=>{ records[m.id]={}; });
  if(!data) return 0;
  let count=0;
  Object.entries(data).forEach(([key, row])=>{
    if(!row) return;
    const mid=parseInt(row.memberId||key.split('_')[0]);
    const date=String(row.date||key.split('_').slice(1).join('_')||'').trim();
    const status=String(row.status||'').trim();
    const note=String(row.note||'').trim();
    if(!mid||!date||!status) return;
    if(!records[mid]) records[mid]={};
    records[mid][date]=status;
    if(note) notes[`${mid}_${date}`]=note;
    count++;
  });
  return count;
}

function startRealtimeSync(){
  if(fbEventSource){ fbEventSource.close(); fbEventSource=null; }
  updateSyncStatus('연결 중...','var(--text3)');
  try{
    fbEventSource = new EventSource(`${FB_URL}/.json`);
    fbEventSource.addEventListener('put', e=>{
      try{
        const payload=JSON.parse(e.data);
        // 전체 데이터 변경 (최초 연결 시)
        if(payload.path==='/'){
          if(payload.data?.records) applyFirebaseData(payload.data.records);
          if(payload.data?.config) applyConfig(payload.data.config);
        } else if(payload.path==='/records'||payload.path.startsWith('/records/')){
          applyFirebaseData(payload.data);
        } else if(payload.path==='/config'||payload.path.startsWith('/config/')){
          applyConfig(payload.data);
        }
        updateSyncStatus('● 실시간','#69db7c');
        renderCurrentView();
      }catch(err){ console.error('SSE put 오류:', err); }
    });
    fbEventSource.addEventListener('patch', e=>{
      try{
        const payload=JSON.parse(e.data);
        if(!payload.data) return;
        Object.entries(payload.data).forEach(([key,row])=>{
          if(!row) return;
          const mid=parseInt(row.memberId||key.split('_')[0]);
          const date=String(row.date||key.split('_').slice(1).join('_')||'').trim();
          const status=String(row.status||'').trim();
          const note=String(row.note||'').trim();
          if(!mid||!date||!status) return;
          if(!records[mid]) records[mid]={};
          records[mid][date]=status;
          if(note) notes[`${mid}_${date}`]=note;
        });
        updateSyncStatus('● 실시간','#69db7c');
        renderCurrentView();
      }catch(err){ console.error('SSE patch 오류:', err); }
    });
    fbEventSource.onerror=()=>{
      updateSyncStatus('⚠️ 재연결 중','#ffc947');
      fbEventSource.close(); fbEventSource=null;
      setTimeout(startRealtimeSync, 5000);
    };
  }catch(e){
    console.error('SSE 시작 오류:', e);
    updateSyncStatus('❌ 연결 실패','#ff6b6b');
    setTimeout(startRealtimeSync, 5000);
  }
}

function generateICS(date, subject, note=''){
  const uid = `sl-attend-${date}-${Date.now()}@slworld.com`;
  const stamp = new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const start = date.replace(/-/g,'');
  // 한국 시간 09:00 ~ 18:00
  return [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//SL Corporation//ATTEND App//KO',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${stamp}`,
    `DTSTART;TZID=Asia/Seoul:${start}T090000`,
    `DTEND;TZID=Asia/Seoul:${start}T180000`,
    `SUMMARY:${subject}`,
    `DESCRIPTION:${note||'ATTEND 앱에서 등록됨'}`,
    'STATUS:CONFIRMED',
    'CATEGORIES:SL-ATTEND',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
}

function addToCalendar(mid, date, status, note=''){
  const subject = STATUS_SUBJECT[status];
  if(!subject){ showToast('ℹ️ 출근/미확인은 캘린더 등록 불필요'); return; }

  const ics = generateICS(date, subject, note);
  const blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);

  // 모바일: 직접 열기 → OS가 캘린더 앱 제안
  const a = document.createElement('a');
  a.href = url;
  a.download = `${subject}-${date}.ics`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast(`📅 "${subject}" 캘린더 앱으로 전송 중...`);
}

async function addStatus(){
  const label = document.getElementById('newStatusLabel')?.value?.trim();

  const key = 'custom_' + Date.now();
  STATUSES[key] = {
    label, color,
    bg: `rgba(${parseInt(color.slice(1,3),16)},${parseInt(color.slice(3,5),16)},${parseInt(color.slice(5,7),16)},0.18)`,
    dot: color
  };
  STATUS_SUBJECT[key] = label;
  await saveStatuses();
  showToast(`✅ "${label}" 항목 추가`);
  renderView('status');
}

async function renameStatus(key, newLabel){
  if(!newLabel.trim()){ showToast('⚠️ 이름을 입력해주세요'); return; }
  if(STATUSES[key]) STATUSES[key].label = newLabel.trim();
  if(STATUS_SUBJECT[key] !== null) STATUS_SUBJECT[key] = newLabel.trim();
  await saveStatuses();
  showToast(`✅ "${newLabel}" 으로 변경됨`);
}

async function deleteStatus(key){

  delete STATUS_SUBJECT[key];
  await saveStatuses();

}

async function toggleAdmin(id){
  if(ADMINS.includes(id)){
    if(ADMINS.length<=1){showToast('⚠️ 최소 1명의 관리자 필요');return;}
    ADMINS.splice(ADMINS.indexOf(id),1);
    showToast('관리자 해제됨');
  } else {
    ADMINS.push(id);
    showToast('👑 관리자 지정됨');
  }
  await saveAdmins(ADMINS);
  renderView('team');
}
function resetMemberPin(id, name){
  if(!confirm(`"${name}"의 PIN을 초기화할까요?\n다음 로그인 시 새로 설정하게 됩니다.`)) return;
  const pins = loadPins();
  delete pins[id];
  savePins(pins);
  showToast(`✅ ${name} PIN 초기화 완료`);
}

async function addMember(){
  const name = document.getElementById('addName')?.value?.trim();
  const role = document.getElementById('addRole')?.value?.trim();
  if(!name){ showToast('⚠️ 이름을 입력해주세요'); return; }
  if(!role){ showToast('⚠️ 직급/부서를 입력해주세요'); return; }
  const id = Math.max(...MEMBERS.map(m=>m.id), 0) + 1;
  const newMember = {id, name, role, av:makeAvatar(name), email:''};
  MEMBERS.push(newMember);
  records[id] = {}; graphEvents[id] = [];
  await saveMembers();
  buildMemberPicker();
  showToast(`✅ ${name} 추가 완료`);
  renderView('team');
}

async function deleteMember(id){
  const m = MEMBERS.find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`"${m.name}"을 삭제할까요?`)) return;
  const ai = ADMINS.indexOf(id);
  if(ai !== -1){ ADMINS.splice(ai,1); await saveAdmins(ADMINS); }
  MEMBERS.splice(MEMBERS.findIndex(x=>x.id===id), 1);
  delete records[id]; delete graphEvents[id];
  // PIN 삭제
  const pins = loadPins(); delete pins[id]; savePins(pins);
  await saveMembers();
  buildMemberPicker();
  showToast(`🗑️ ${m.name} 삭제 완료`);
  renderView('team');
}

async function resetMembers(){
  if(!confirm('팀원 목록을 기본값으로 초기화할까요?')) return;
  MEMBERS.length=0; DEFAULT_MEMBERS.forEach(m=>MEMBERS.push({...m}));
  ADMINS.length=0; ADMINS.push(1);
  initRecords();
  await saveMembers(); await saveAdmins(ADMINS);
  buildMemberPicker();
  showToast('✅ 기본값으로 초기화 완료');
  renderView('team');
}

function openModal(mid,date){

  const m=MEMBERS.find(x=>x.id===mid); editTarget={memberId:mid,date};
  document.getElementById('modalTitle').textContent=m.name;
  document.getElementById('modalDate').textContent=date;
  document.getElementById('noteInput').value=notes[`${mid}_${date}`]||'';

  document.getElementById('statusGrid').innerHTML=Object.entries(STATUSES).filter(([k])=>k!=='pending').map(([k,v])=>
    `<button class="status-opt${cur===k?' selected':''}" id="opt_${k}" style="background:${cur===k?v.bg:'var(--surface2)'};border-color:${cur===k?v.color:'var(--border)'};color:${cur===k?v.color:'var(--text2)'}" onclick="selectStatus('${k}')">${v.label}</button>`

function selectStatus(k){ const sc=STATUSES[k]; document.querySelectorAll('.status-opt').forEach(b=>{b.style.background='var(--surface2)';b.style.borderColor='var(--border)';b.style.color='var(--text2)';b.classList.remove('selected');}); const btn=document.getElementById(`opt_${k}`); btn.classList.add('selected');btn.style.background=sc.bg;btn.style.borderColor=sc.color;btn.style.color=sc.color; editTarget.status=k; }
function saveModal(){
  if(!editTarget)return;
  const{memberId,date,status}=editTarget;
  if(!status){showToast('⚠️ 상태 선택');return;}
  if(!records[memberId])records[memberId]={};
  records[memberId][date]=status;
  const note=document.getElementById('noteInput').value.trim();
  if(note)notes[`${memberId}_${date}`]=note;

  // Google Sheets에 저장 (백그라운드)
  gsSave(memberId, date, status, note);

  const subject=STATUS_SUBJECT[status];
  const isMe=isDemo||isAdmin||memberId===myMemberId;

  if(isMe && subject){
    document.getElementById('editModal').classList.remove('open');
    showCalendarPrompt(memberId, date, status, note);
  } else {
    closeModal();
    showToast('✅ 저장됨');
    renderCurrentView();
  }
}

      <div style="font-size:13px;color:#9fa8c4;margin-bottom:20px">아웃룩 캘린더에도 <strong style="color:${sc.color}">"${subject}"</strong> 일정을 추가할까요?</div>
      <div style="display:flex;gap:8px">
        <button onclick="skipCalendar()" style="flex:1;padding:13px;background:transparent;border:1px solid #363660;border-radius:10px;color:#9fa8c4;font-size:14px;cursor:pointer;font-family:inherit">건너뛰기</button>
        <button onclick="confirmCalendar(${mid},'${date}','${status}','${note}')" style="flex:2;padding:13px;background:#5c7cfa;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">📅 캘린더에 추가</button>
      </div>
    </div>`;
  document.body.appendChild(prompt);
  renderCurrentView();
}

function confirmCalendar(mid, date, status, note){
  document.getElementById('calPrompt')?.remove();
  editTarget=null;
  addToCalendar(mid, date, status, note);
}

function skipCalendar(){
  document.getElementById('calPrompt')?.remove();
  editTarget=null;
  showToast('✅ 앱에만 저장됨');
}
function closeModal(e){ if(e&&e.target!==document.getElementById('editModal'))return; document.getElementById('editModal').classList.remove('open'); editTarget=null; }

// ══════════════════════════
// PWA
// ══════════════════════════
function checkPWAInstall(){
  if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone)return;
  if(localStorage.getItem('sl_pwa_dismissed'))return;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent), isAndroid=/android/i.test(navigator.userAgent);
  if(!isIOS&&!isAndroid)return;
  const banner=document.createElement('div');
  banner.id='pwaBanner';
  banner.style.cssText='position:fixed;bottom:calc(var(--bottomnav-h) + 12px);left:12px;right:12px;background:#222240;border:1px solid #5c7cfa;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:600;box-shadow:0 8px 32px rgba(0,0,0,0.5)';
  const guide=isIOS?'↑ <b>공유</b> → <b>홈 화면에 추가</b>':'⋮ <b>메뉴</b> → <b>앱 설치</b>';
  banner.innerHTML=`<span style="font-size:26px">📲</span><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#e8eaf6;margin-bottom:3px">앱으로 설치하기</div><div style="font-size:11px;color:#9fa8c4;line-height:1.6">${guide} 탭하면 홈 화면에 아이콘 생성</div></div><button onclick="dismissPWA()" style="background:none;border:none;color:#6b74a0;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0">✕</button>`;
  document.body.appendChild(banner);
}
function dismissPWA(){ document.getElementById('pwaBanner')?.remove(); localStorage.setItem('sl_pwa_dismissed','1'); }

// ══════════════════════════
// TOAST
// ══════════════════════════
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._timer); t._timer=setTimeout(()=>t.style.display='none',2500); }

// ══════════════════════════
// INIT
// ══════════════════════════
function initApp(){
  // MEMBERS가 로드됐는지 확인 후 picker 렌더링
  if(typeof MEMBERS === 'undefined' || !MEMBERS.length){
    setTimeout(initApp, 100);
    return;
  }
  buildMemberPicker();
  const name = sessionStorage.getItem('sl_user_name');
  const email = sessionStorage.getItem('sl_user_email')||'';
  const mid = parseInt(sessionStorage.getItem('sl_user_mid')||'0')||null;
  if(name){ currentAccount={name,email}; initRecords(); enterApp(name, email, mid); return; }
  setTimeout(checkPWAInstall, 2000);
}

document.addEventListener('DOMContentLoaded', initApp);
window.addEventListener('load', ()=>{ if(!document.getElementById('memberPickGrid')?.children?.length) initApp(); });
</script>
</body>
</html>
