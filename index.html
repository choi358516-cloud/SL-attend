<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ATTEND — Finance Team</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1f2d45;
  --text: #f0f4ff;
  --text2: #7a8ba8;
  --text3: #4a5a72;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --purple: #8b5cf6;
  --cyan: #06b6d4;
  --radius: 14px;
  --topbar-h: 56px;
  --bottomnav-h: 64px;
  --drawer-w: 260px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  overscroll-behavior: none;
}

/* ═══════════════════════════════
   LOGIN
═══════════════════════════════ */
#loginScreen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; padding: 20px;
  background: var(--bg);
  overflow-y: auto;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  width: 100%; max-width: 380px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  text-align: center;
}
.login-logo {
  font-family: 'Syne', sans-serif;
  font-size: 11px; letter-spacing: 0.3em;
  color: var(--text2); margin-bottom: 24px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-hex { font-size: 20px; color: var(--gold); }
.login-title {
  font-family: 'Syne', sans-serif;
  font-size: 30px; font-weight: 800;
  line-height: 1.1; margin-bottom: 8px;
  background: linear-gradient(135deg, #f0f4ff, #7a8ba8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; line-height: 1.6; }
.ms-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 15px 20px;
  background: #2563eb; color: #fff;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; touch-action: manipulation;
}
.ms-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.config-section { margin-top: 24px; text-align: left; }
.config-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 5px; }
.config-input {
  width: 100%; padding: 10px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-size: 12px; font-family: 'Courier New', monospace;
  outline: none; margin-bottom: 8px;
}
.config-input:focus { border-color: var(--accent); }
.config-input::placeholder { color: var(--text3); }
.demo-btn {
  width: 100%; padding: 13px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2);
  font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 10px;
  touch-action: manipulation;
}
.login-note { font-size: 10px; color: var(--text3); margin-top: 16px; line-height: 1.7; }

/* ═══════════════════════════════
   APP SHELL
═══════════════════════════════ */
#appShell { display: none; height: 100%; position: relative; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  backdrop-filter: blur(2px);
  transition: opacity 0.25s;
}
.drawer-overlay.open { display: block; }

/* ── DRAWER ── */
.drawer {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--drawer-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 300;
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.drawer-logo {
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
  display: flex; align-items: center; gap: 8px;
}
.drawer-hex { color: var(--gold); font-size: 16px; }
.drawer-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); border: none; color: var(--text2);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}

.drawer-user {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.drawer-avatar {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.drawer-username { font-size: 13px; font-weight: 600; }
.drawer-role { font-size: 11px; color: var(--text2); margin-top: 1px; }

.drawer-nav { padding: 12px; flex: 1; }
.nav-section-label {
  font-size: 10px; color: var(--text3); letter-spacing: 0.12em;
  padding: 0 8px; margin: 12px 0 6px;
}
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 11px 12px;
  border-radius: 10px; border: none;
  background: transparent; color: var(--text2);
  font-size: 13px; cursor: pointer; text-align: left;
  transition: background 0.15s; font-family: inherit;
  touch-action: manipulation;
}
.nav-btn:active { background: var(--surface2); }
.nav-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; }

.drawer-footer {
  padding: 14px 18px;
  border-top: 1px solid var(--border);
}
.sync-time { font-size: 10px; color: var(--text3); margin-bottom: 8px; }
.drawer-sync-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 10px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit;
  margin-bottom: 8px; touch-action: manipulation;
}
.drawer-sync-btn.syncing { color: var(--gold); border-color: rgba(245,158,11,0.4); }
.drawer-logout-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 10px; border-radius: 10px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text3); font-size: 12px; cursor: pointer; font-family: inherit;
  touch-action: manipulation;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
  z-index: 100;
}
.menu-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface2); border: none; color: var(--text);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; touch-action: manipulation;
}
.topbar-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; flex: 1; }
.topbar-sync {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; transition: all 0.2s;
}
.topbar-sync.syncing { color: var(--gold); border-color: rgba(245,158,11,0.4); animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.topbar-badge {
  font-size: 10px; padding: 3px 10px;
  background: var(--surface2); border-radius: 20px; color: var(--text2);
  border: 1px solid var(--border); white-space: nowrap;
}
.topbar-badge.live { color: var(--green); border-color: rgba(16,185,129,0.3); }

/* ── MAIN SCROLL ── */
.main-scroll {
  position: fixed;
  top: var(--topbar-h);
  left: 0; right: 0;
  bottom: var(--bottomnav-h);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bottomnav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(4, 1fr);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: transparent;
  color: var(--text3); cursor: pointer; font-family: inherit;
  touch-action: manipulation; transition: color 0.15s;
  padding: 8px 4px;
}
.bnav-btn.active { color: var(--accent); }
.bnav-icon { font-size: 20px; line-height: 1; }
.bnav-label { font-size: 10px; font-weight: 500; }

/* ═══════════════════════════════
   PAGE ELEMENTS
═══════════════════════════════ */
.page-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }

/* Summary strip — 2 rows of 3 on mobile */
.summary-strip {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.s-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 8px; text-align: center;
  cursor: pointer; position: relative; overflow: hidden;
  touch-action: manipulation;
}
.s-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.s-card.active { border-color: currentColor; }
.s-count { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; }
.s-label { font-size:10px; color:var(--text2); margin-top:2px; }

/* Member cards — 1 col on mobile */
.member-grid { display: flex; flex-direction: column; gap: 10px; }
.m-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.m-card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.m-avatar {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.m-name { font-size: 14px; font-weight: 700; }
.m-role { font-size: 11px; color: var(--text2); margin-top: 1px; }
.m-status-badge { border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-left: auto; }
.m-event-item { display:flex; align-items:center; gap:6px; padding:5px 8px; background:var(--surface2); border-radius:6px; margin-bottom:4px; }
.m-event-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.m-event-text { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.m-edit-btn {
  width:100%; margin-top:10px; padding:8px;
  background:transparent; border:1px solid var(--border);
  border-radius:8px; color:var(--text3); font-size:12px; cursor:pointer; font-family:inherit;
  touch-action: manipulation;
}

/* Filter bar */
.filter-bar {
  display:flex; align-items:center; gap:8px;
  background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2);
  border-radius:8px; padding:8px 12px; margin-bottom:12px; font-size:12px;
}
.filter-clear { background:none; border:none; color:var(--gold); cursor:pointer; font-size:11px; font-weight:700; margin-left:auto; font-family:inherit; }

/* Monthly table wrapper — horizontal scroll */
.table-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow-x:auto; margin-bottom:12px;
  -webkit-overflow-scrolling: touch;
}
table { border-collapse:collapse; white-space:nowrap; }
th,td { padding:7px 4px; }
th { font-size:9px; color:var(--text2); border-bottom:1px solid var(--border); text-align:center; font-weight:500; }
th.th-name { text-align:left; padding-left:12px; width:100px; }
td { font-size:11px; text-align:center; border-bottom:1px solid rgba(31,45,69,0.5); }
td.td-name { text-align:left; padding-left:12px; font-weight:600; }
tr:last-child td { border-bottom:none; }
.t-dot { width:9px; height:9px; border-radius:50%; display:inline-block; cursor:pointer; }
.td-stat { font-weight:700; font-size:11px; }
.t-avatar { width:22px; height:22px; border-radius:5px; display:inline-flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; background:var(--surface2); color:var(--text2); margin-right:5px; vertical-align:middle; }

/* Legend */
.legend { display:flex; flex-wrap:wrap; gap:10px; align-items:center; font-size:10px; color:var(--text2); }
.leg-item { display:flex; align-items:center; gap:4px; }

/* Member select grid — 2 col on mobile */
.member-select-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.ms-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 12px; text-align:center;
  cursor:pointer; touch-action:manipulation; transition:border 0.15s;
}
.ms-card.active { border-color:var(--accent); }
.ms-big-av { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; margin:0 auto 8px; background:var(--surface2); color:var(--text2); }
.ms-card.active .ms-big-av { background:var(--accent); color:#fff; }
.ms-name { font-size:13px; font-weight:700; }
.ms-role { font-size:10px; color:var(--text2); margin:2px 0 6px; }
.ms-rate { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
.ms-mini { display:flex; gap:6px; justify-content:center; font-size:10px; font-weight:600; flex-wrap:wrap; margin-top:4px; }

/* Detail box */
.detail-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.detail-stat-row { display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
.detail-stat-card { background:var(--surface2); border-radius:8px; padding:8px 12px; text-align:center; flex-shrink:0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-cell { border-radius:5px; padding:4px 2px; text-align:center; }

/* Calendar view */
.ev-item { display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--border); }
.graph-tag { display:inline-flex; align-items:center; gap:3px; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); border-radius:4px; padding:2px 5px; font-size:9px; color:var(--accent2); }

/* ═══════════════════════════════
   MODAL (bottom sheet on mobile)
═══════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.6); z-index:400;
  align-items:flex-end; justify-content:center;
  backdrop-filter:blur(3px);
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); 
  border-radius:20px 20px 0 0;
  border:1px solid var(--border);
  border-bottom:none;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  width:100%; max-width:480px;
  box-shadow:0 -20px 60px rgba(0,0,0,0.4);
  animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.modal-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.modal-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
.modal-date { font-size:12px; color:var(--text2); margin-top:2px; }
.modal-close { background:none; border:none; color:var(--text3); cursor:pointer; font-size:20px; padding:4px; }
.status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.status-opt { padding:11px 6px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; touch-action:manipulation; }
.note-input { width:100%; padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; resize:none; font-family:inherit; outline:none; margin-bottom:14px; }
.note-input:focus { border-color:var(--accent); }
.modal-btns { display:flex; gap:8px; }
.btn-cancel { flex:1; padding:13px; background:transparent; border:1px solid var(--border); border-radius:10px; color:var(--text2); cursor:pointer; font-family:inherit; font-size:14px; touch-action:manipulation; }
.btn-save { flex:2; padding:13px; background:var(--accent); border:none; border-radius:10px; color:#fff; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; touch-action:manipulation; }

/* ─ Toast ─ */
.toast {
  display:none; position:fixed; bottom:calc(var(--bottomnav-h) + 12px); left:50%;
  transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border);
  padding:10px 20px; border-radius:20px; font-size:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4); z-index:500; white-space:nowrap;
}

/* Scrollbar */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span class="login-hex">⬡</span> ATTEND / FINANCE</div>
    <div class="login-title">근태 관리<br>시스템</div>
    <p class="login-sub">Microsoft 365 계정으로 로그인하면<br>팀원 캘린더를 자동 동기화합니다</p>
    <div class="config-section">
      <div class="config-label">AZURE AD CLIENT ID</div>
      <input class="config-input" id="clientIdInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
      <div class="config-label">TENANT ID</div>
      <input class="config-input" id="tenantIdInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
    </div>
    <button class="ms-btn" onclick="loginWithMS()">
      <svg viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
      Microsoft 계정으로 로그인
    </button>
    <button class="demo-btn" onclick="enterDemo()">🔍 데모 모드로 미리 보기</button>
    <p class="login-note">필요 권한: Calendars.Read · User.Read · User.ReadBasic.All</p>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="appShell">

  <!-- Drawer overlay -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <!-- Drawer -->
  <nav class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo"><span class="drawer-hex">⬡</span> ATTEND</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-avatar" id="drawerInitial">U</div>
      <div>
        <div class="drawer-username" id="drawerName">사용자</div>
        <div class="drawer-role">Finance Team</div>
      </div>
    </div>
    <div class="drawer-nav">
      <div class="nav-section-label">현황</div>
      <button class="nav-btn active" id="dnav-today" onclick="switchView('today')">
        <span class="nav-icon">◉</span> 오늘 현황
      </button>
      <button class="nav-btn" id="dnav-monthly" onclick="switchView('monthly')">
        <span class="nav-icon">▦</span> 월간 현황
      </button>
      <button class="nav-btn" id="dnav-member" onclick="switchView('member')">
        <span class="nav-icon">◈</span> 개인 상세
      </button>
      <div class="nav-section-label">아웃룩</div>
      <button class="nav-btn" id="dnav-calendar" onclick="switchView('calendar')">
        <span class="nav-icon">📅</span> 캘린더 연동
      </button>
    </div>
    <div class="drawer-footer">
      <div class="sync-time" id="lastSync">동기화: 미실행</div>

        <span id="drawerSyncIcon">↻</span> 아웃룩 동기화

  <!-- Topbar -->
  <header class="topbar">
    <button class="menu-btn" onclick="openDrawer()">☰</button>
    <div class="topbar-title" id="topbarTitle">오늘 현황</div>
    <span class="topbar-badge" id="syncBadge">미동기화</span>
    <button class="topbar-sync" id="topSyncBtn" onclick="syncGraphData()">↻</button>
  </header>

  <!-- Main scroll area -->
  <div class="main-scroll" id="mainContent"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="bnav-btn active" id="bnav-today" onclick="switchView('today')">
      <span class="bnav-icon">◉</span>
      <span class="bnav-label">오늘</span>
    </button>
    <button class="bnav-btn" id="bnav-monthly" onclick="switchView('monthly')">
      <span class="bnav-icon">▦</span>
      <span class="bnav-label">월간</span>
    </button>
    <button class="bnav-btn" id="bnav-member" onclick="switchView('member')">
      <span class="bnav-icon">◈</span>
      <span class="bnav-label">개인</span>
    </button>
    <button class="bnav-btn" id="bnav-calendar" onclick="switchView('calendar')">
      <span class="bnav-icon">📅</span>
      <span class="bnav-label">캘린더</span>
    </button>
  </nav>
</div>

<!-- Bottom Sheet Modal -->
<div class="modal-overlay" id="editModal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-date" id="modalDate"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="status-grid" id="statusGrid"></div>
    <textarea class="note-input" id="noteInput" placeholder="비고 (출장지, 회의 제목 등)" rows="2"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════
// CONFIG & STATE
// ══════════════════════════
const SCOPES = ['Calendars.Read','User.Read','User.ReadBasic.All'];
let msalInstance=null, currentAccount=null, isDemo=false;
let currentView='today', filterStatus='all', editTarget=null;

const STATUSES = {
  present:  {label:'출근', color:'#10b981', bg:'rgba(16,185,129,0.15)',  dot:'#10b981'},
  remote:   {label:'재택', color:'#6366f1', bg:'rgba(99,102,241,0.15)',  dot:'#6366f1'},
  late:     {label:'지각', color:'#f59e0b', bg:'rgba(245,158,11,0.15)',  dot:'#f59e0b'},
  absent:   {label:'결근', color:'#ef4444', bg:'rgba(239,68,68,0.15)',   dot:'#ef4444'},
  vacation: {label:'휴가', color:'#8b5cf6', bg:'rgba(139,92,246,0.15)', dot:'#8b5cf6'},
  business: {label:'출장', color:'#06b6d4', bg:'rgba(6,182,212,0.15)',  dot:'#06b6d4'},
  pending:  {label:'미확인',color:'#4a5a72',bg:'rgba(74,90,114,0.15)', dot:'#4a5a72'},
};
const MEMBERS = [
  {id:1,name:'김준호',role:'책임/Finance',    av:'KJ',email:'junho.kim@slcorp.com'},
  {id:2,name:'이수연',role:'대리/Accounting', av:'LS',email:'suyeon.lee@slcorp.com'},
  {id:3,name:'박민준',role:'사원/Tax',         av:'PM',email:'minjun.park@slcorp.com'},
  {id:4,name:'최예린',role:'대리/Treasury',   av:'CY',email:'yerin.choi@slcorp.com'},
  {id:5,name:'정태윤',role:'사원/Finance',    av:'JT',email:'taeyun.jung@slcorp.com'},
  {id:6,name:'한소희',role:'책임/Controlling',av:'HS',email:'sohee.han@slcorp.com'},
];
const today = new Date();
const todayStr = fmt(today);
let records={}, notes={}, graphEvents={};

function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getWorkdays(){
  const days=[], y=today.getFullYear(), m=today.getMonth();
  const tot=new Date(y,m+1,0).getDate();
  for(let d=1;d<=tot;d++){
    const dt=new Date(y,m,d), ds=fmt(dt);
    if(dt.getDay()!==0&&dt.getDay()!==6&&ds<=todayStr) days.push({date:ds,day:d,wd:dt.getDay()});
  }
  return days;
}
function getAllDays(){
  const days=[], y=today.getFullYear(), m=today.getMonth();
  const tot=new Date(y,m+1,0).getDate();
  for(let d=1;d<=tot;d++){const dt=new Date(y,m,d);days.push({date:fmt(dt),day:d,wd:dt.getDay()});}
  return days;
}
function initRecords(){
  MEMBERS.forEach(m=>{
    records[m.id]={}; graphEvents[m.id]=[];
    getWorkdays().forEach(({date})=>{
      if(date===todayStr){records[m.id][date]='pending';return;}
      const r=Math.random();
      records[m.id][date]=r<0.7?'present':r<0.82?'remote':r<0.88?'vacation':r<0.93?'late':r<0.97?'business':'absent';
    });
  });
}

// ══════════════════════════
// DRAWER
// ══════════════════════════
function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow='';
}

// ══════════════════════════
// AUTH
// ══════════════════════════
function initMsal(cid,tid){
  msalInstance=new msal.PublicClientApplication({
    auth:{clientId:cid,authority:`https://login.microsoftonline.com/${tid}`,redirectUri:window.location.href.split('?')[0].split('#')[0]},
    cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}
  });
}
async function loginWithMS(){
  const cid=document.getElementById('clientIdInput').value.trim();
  const tid=document.getElementById('tenantIdInput').value.trim();
  if(!cid||!tid){showToast('⚠️ ID를 입력해주세요');return;}
  // Save IDs to localStorage so we can restore after redirect
  localStorage.setItem('sl_attend_cid',cid);
  localStorage.setItem('sl_attend_tid',tid);
  try{
    initMsal(cid,tid);
    await msalInstance.initialize();
    // Handle redirect response first
    const r=await msalInstance.handleRedirectPromise();
    if(r&&r.account){
      currentAccount=r.account;
      initRecords(); enterApp(r.account.name||r.account.username); syncGraphData();
      return;
    }
    // Redirect to Microsoft login (no popup)
    await msalInstance.loginRedirect({scopes:SCOPES});
  }catch(e){showToast('❌ 로그인 실패: '+e.message);}
}
async function getToken(){
  if(!msalInstance||!currentAccount)return null;
  try{const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:currentAccount});return r.accessToken;}
  catch{
    localStorage.setItem('sl_attend_cid',localStorage.getItem('sl_attend_cid'));
    await msalInstance.acquireTokenRedirect({scopes:SCOPES,account:currentAccount});
    return null;
  }
}
// Auto-handle redirect on page load
async function handleRedirectOnLoad(){
  const cid=localStorage.getItem('sl_attend_cid');
  const tid=localStorage.getItem('sl_attend_tid');
  if(!cid||!tid)return;
  try{
    initMsal(cid,tid);
    await msalInstance.initialize();
    const r=await msalInstance.handleRedirectPromise();
    if(r&&r.account){
      // Restore IDs into input fields
      document.getElementById('clientIdInput').value=cid;
      document.getElementById('tenantIdInput').value=tid;
      currentAccount=r.account;
      initRecords(); enterApp(r.account.name||r.account.username); syncGraphData();
      return;
    }
    // Check if already logged in
    const accounts=msalInstance.getAllAccounts();
    if(accounts.length>0){
      document.getElementById('clientIdInput').value=cid;
      document.getElementById('tenantIdInput').value=tid;
      currentAccount=accounts[0];
      initRecords(); enterApp(accounts[0].name||accounts[0].username); syncGraphData();
    }
  }catch(e){console.log('Redirect handle:',e);}
}
async function syncGraphData(){
  if(isDemo){showToast('✨ 데모 모드 실행 중');return;}
  const tb=document.getElementById('topSyncBtn'), db=document.getElementById('drawerSyncBtn');
  tb.classList.add('syncing'); db.classList.add('syncing');
  showToast('🔄 아웃룩 동기화 중...');
  const token=await getToken();
  if(!token){tb.classList.remove('syncing');db.classList.remove('syncing');return;}
  const s=new Date(today.getFullYear(),today.getMonth(),1).toISOString();
  const e=new Date(today.getFullYear(),today.getMonth()+1,0,23,59).toISOString();
  let cnt=0;
  for(const m of MEMBERS){
    try{
      const res=await fetch(`https://graph.microsoft.com/v1.0/users/${m.email}/calendarView?startDateTime=${s}&endDateTime=${e}&$select=subject,start,end,showAs&$top=50`,{headers:{Authorization:`Bearer ${token}`}});
      if(!res.ok)continue;
      const d=await res.json();
      processGraphEvents(m.id,d.value||[]); cnt++;
    }catch{}
  }
  const now=new Date().toLocaleTimeString('ko-KR');
  document.getElementById('lastSync').textContent=`동기화: ${now}`;
  tb.classList.remove('syncing'); db.classList.remove('syncing');
  updateSyncBadge(true);
  showToast(`✅ ${cnt}명 동기화 완료`);
  renderCurrentView();
}
function processGraphEvents(mid,evs){
  graphEvents[mid]=[];
  evs.forEach(ev=>{
    const d=ev.start?.dateTime?.substring(0,10)||ev.start?.date;
    if(!d)return;
    const t=ev.subject||'';
    const lo=t.toLowerCase();
    let type='meeting';
    if(lo.includes('휴가')||lo.includes('vacation')||lo.includes('연차')||lo.includes('반차'))type='vacation';
    else if(lo.includes('출장')||lo.includes('business trip'))type='business';
    else if(lo.includes('재택')||lo.includes('wfh')||lo.includes('remote'))type='remote';
    else if(lo.includes('병가')||lo.includes('sick'))type='absent';
    graphEvents[mid].push({title:t,date:d,type});
    if(['vacation','business','remote','absent'].includes(type)&&d<=todayStr){
      if(!records[mid])records[mid]={};
      records[mid][d]=type;
    }
  });
}
function updateSyncBadge(live){
  const b=document.getElementById('syncBadge');
  b.textContent=live?'● 연동됨':'미동기화';
  b.className='topbar-badge'+(live?' live':'');
}

// ══════════════════════════
// DEMO
// ══════════════════════════
function enterDemo(){
  isDemo=true; initRecords(); injectDemo(); enterApp('김준호 (데모)');
  showToast('🎯 데모 모드');
}
function injectDemo(){
  const wd=getWorkdays();
  [{mid:2,t:'연차 휴가',tp:'vacation'},{mid:3,t:'서울 출장',tp:'business'},
   {mid:4,t:'재택근무',tp:'remote'},{mid:5,t:'팀 월례 회의',tp:'meeting'},{mid:6,t:'반차(오후)',tp:'vacation'}]
  .forEach((d,i)=>{
    const day=wd[wd.length-1-i]; if(!day)return;
    graphEvents[d.mid].push({title:d.t,date:day.date,type:d.tp});
    if(['vacation','business','remote'].includes(d.tp)) records[d.mid][day.date]=d.tp;
  });
  ['present','remote','present','late','vacation','present'].forEach((s,i)=>records[MEMBERS[i].id][todayStr]=s);
  updateSyncBadge(true);
}

// ══════════════════════════
// APP ENTRY / EXIT
// ══════════════════════════
function enterApp(name){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='block';
  document.getElementById('drawerName').textContent=name;
  document.getElementById('drawerInitial').textContent=name.charAt(0);
  renderView('today');
}
function logoutUser(){
  closeDrawer();
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appShell').style.display='none';
  isDemo=false; currentAccount=null; filterStatus='all';
  updateSyncBadge(false);
}

// ══════════════════════════
// VIEW ROUTING
// ══════════════════════════
const VIEW_TITLES={today:'오늘 현황',monthly:'월간 현황',member:'개인 상세',calendar:'캘린더 연동'};
function switchView(v){
  currentView=v; filterStatus='all'; closeDrawer();
  // update nav active states
  ['today','monthly','member','calendar'].forEach(k=>{
    document.getElementById(`bnav-${k}`)?.classList.toggle('active',k===v);
    document.getElementById(`dnav-${k}`)?.classList.toggle('active',k===v);
  });
  document.getElementById('topbarTitle').textContent=VIEW_TITLES[v];
  renderView(v);
}
function renderView(v){ currentView=v; const el=document.getElementById('mainContent'); if(v==='today')el.innerHTML=buildToday(); else if(v==='monthly')el.innerHTML=buildMonthly(); else if(v==='member')el.innerHTML=buildMember(); else el.innerHTML=buildCalendar(); el.scrollTop=0; }
function renderCurrentView(){ renderView(currentView); }

// ══════════════════════════
// TODAY VIEW
// ══════════════════════════
function buildToday(){
  const ts=MEMBERS.map(m=>({...m,status:records[m.id]?.[todayStr]||'pending'}));
  const counts={}; Object.keys(STATUSES).forEach(k=>counts[k]=0); ts.forEach(m=>counts[m.status]++);
  const WD=['일','월','화','수','목','금','토'];
  let html=`<div class="page-title">오늘 현황</div>
    <div class="page-sub">${today.getMonth()+1}월 ${today.getDate()}일 (${WD[today.getDay()]}) · Finance Team</div>
    <div class="summary-strip">`;
  ['present','remote','late','absent','vacation','business'].forEach(s=>{
    const sc=STATUSES[s];
    html+=`<div class="s-card ${filterStatus===s?'active':''}" style="color:${sc.color}" onclick="toggleFilter('${s}')">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${sc.color}"></div>
      <div class="s-count">${counts[s]}</div><div class="s-label">${sc.label}</div></div>`;
  });
  html+='</div>';
  if(filterStatus!=='all') html+=`<div class="filter-bar"><span style="color:${STATUSES[filterStatus].color};font-weight:700">${STATUSES[filterStatus].label} 필터</span><button class="filter-clear" onclick="toggleFilter('${filterStatus}')">✕ 전체</button></div>`;
  const fl=filterStatus==='all'?ts:ts.filter(m=>m.status===filterStatus);
  html+='<div class="member-grid">';
  fl.forEach(m=>{
    const sc=STATUSES[m.status];
    const evs=(graphEvents[m.id]||[]).filter(e=>e.date===todayStr);
    html+=`<div class="m-card"><div class="m-card-top">
      <div class="m-avatar" style="background:${sc.bg};color:${sc.color}">${m.av}</div>
      <div style="flex:1;min-width:0"><div class="m-name">${m.name}</div><div class="m-role">${m.role}</div></div>
      <span class="m-status-badge" style="background:${sc.bg};color:${sc.color}">${sc.label}</span></div>`;
    evs.forEach(e=>{const ec=STATUSES[e.type]||STATUSES.pending;html+=`<div class="m-event-item"><div class="m-event-dot" style="background:${ec.dot}"></div><span class="m-event-text">${e.title} <span class="graph-tag">📅</span></span></div>`;});
    const note=notes[`${m.id}_${todayStr}`];
    if(note) html+=`<div style="font-size:11px;color:var(--text2);padding:5px 8px;background:var(--surface2);border-radius:6px;margin-top:4px">💬 ${note}</div>`;
    html+=`<button class="m-edit-btn" onclick="openModal(${m.id},'${todayStr}')">상태 수정</button></div>`;
  });
  html+='</div>';
  return html;
}
function toggleFilter(s){ filterStatus=filterStatus===s?'all':s; renderView('today'); }

// ══════════════════════════
// MONTHLY VIEW
// ══════════════════════════
function buildMonthly(){
  const wd=getWorkdays();
  let html=`<div class="page-title">${today.getMonth()+1}월 현황</div>
    <div class="page-sub">${today.getFullYear()}년 · Finance Team · 좌우 스크롤</div>
    <div class="table-wrap"><table><thead><tr><th class="th-name">이름</th>`;
  wd.forEach(({day,wd:w,date})=>{html+=`<th style="color:${date===todayStr?'#f59e0b':w===5?'#6366f1':'var(--text2)'};font-weight:${date===todayStr?800:500}">${day}</th>`;});
  html+='<th style="color:#10b981;font-size:9px">출</th><th style="color:#6366f1;font-size:9px">재</th><th style="color:#ef4444;font-size:9px">결</th></tr></thead><tbody>';
  MEMBERS.forEach(m=>{
    let pr=0,rm=0,ab=0;
    html+=`<tr><td class="td-name"><span class="t-avatar">${m.av}</span>${m.name}</td>`;
    wd.forEach(({date})=>{
      const s=records[m.id]?.[date]||'pending', sc=STATUSES[s];
      if(s==='present'||s==='late')pr++; if(s==='remote')rm++; if(s==='absent')ab++;
      const hasEv=(graphEvents[m.id]||[]).some(e=>e.date===date);
      html+=`<td style="background:${date===todayStr?'rgba(245,158,11,0.05)':'transparent'}" onclick="openModal(${m.id},'${date}')"><div style="position:relative;display:inline-block"><span class="t-dot" style="background:${sc.dot}" title="${sc.label}"></span>${hasEv?'<span style="position:absolute;top:-2px;right:-2px;width:4px;height:4px;background:#3b82f6;border-radius:50%"></span>':''}</div></td>`;
    });
    html+=`<td class="td-stat" style="color:#10b981">${pr}</td><td class="td-stat" style="color:#6366f1">${rm}</td><td class="td-stat" style="color:#ef4444">${ab}</td></tr>`;
  });
  html+='</tbody></table></div>';
  html+='<div class="legend">';
  Object.entries(STATUSES).filter(([k])=>k!=='pending').forEach(([k,v])=>{ html+=`<span class="leg-item"><span class="t-dot" style="background:${v.dot}"></span>${v.label}</span>`; });
  html+='</div>';
  return html;
}

// ══════════════════════════
// MEMBER VIEW
// ══════════════════════════
function buildMember(){
  const wd=getWorkdays();
  let html=`<div class="page-title">개인 상세</div><div class="page-sub">팀원 선택 → 월간 달력</div>
    <div class="member-select-grid">`;
  MEMBERS.forEach(m=>{
    const stats={}; Object.keys(STATUSES).forEach(k=>stats[k]=0);
    wd.forEach(({date})=>{const s=records[m.id]?.[date]||'pending';stats[s]++;});
    const total=wd.length, rate=total>0?Math.round(((stats.present+stats.remote+stats.late)/total)*100):0;
    const evCnt=(graphEvents[m.id]||[]).length;
    html+=`<div class="ms-card" id="msc-${m.id}" onclick="showMemberDetail(${m.id})">
      <div class="ms-big-av">${m.av}</div>
      <div class="ms-name">${m.name}</div><div class="ms-role">${m.role}</div>
      <div class="ms-rate" style="color:${rate>=90?'#10b981':rate>=70?'#f59e0b':'#ef4444'}">${rate}%</div>
      <div class="ms-mini">
        <span style="color:#10b981">출 ${stats.present}</span>
        <span style="color:#6366f1">재 ${stats.remote}</span>
        <span style="color:#ef4444">결 ${stats.absent}</span>
        ${evCnt?`<span style="color:#3b82f6">📅${evCnt}</span>`:''}
      </div></div>`;
  });
  html+='</div><div id="memberDetailArea"></div>';
  return html;
}
function showMemberDetail(id){
  document.querySelectorAll('.ms-card').forEach(c=>c.classList.remove('active'));
  document.getElementById(`msc-${id}`)?.classList.add('active');
  const m=MEMBERS.find(x=>x.id===id);
  const allDays=getAllDays(), wd=getWorkdays(), evs=graphEvents[id]||[];
  const stats={}; Object.keys(STATUSES).forEach(k=>stats[k]=0);
  wd.forEach(({date})=>{const s=records[id]?.[date]||'pending';stats[s]++;});
  const firstDay=new Date(today.getFullYear(),today.getMonth(),1).getDay();
  let html=`<div class="detail-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800">${m.name} · ${today.getMonth()+1}월</div>
    </div>
    <div class="detail-stat-row">`;
  Object.entries(STATUSES).filter(([k])=>k!=='pending').forEach(([k,v])=>{
    html+=`<div class="detail-stat-card" style="border-left:3px solid ${v.color}"><div style="color:${v.color};font-family:'Syne',sans-serif;font-size:18px;font-weight:800">${stats[k]}</div><div style="font-size:10px;color:var(--text2)">${v.label}</div></div>`;
  });
  html+='</div><div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(d=>{html+=`<div style="text-align:center;font-size:9px;color:var(--text3);padding:3px">${d}</div>`;});
  for(let i=0;i<firstDay;i++) html+='<div></div>';
  allDays.forEach(({date,day,wd:w})=>{
    const s=records[id]?.[date],isFuture=date>todayStr,isWE=w===0||w===6,sc=s?STATUSES[s]:null,hasEv=evs.some(e=>e.date===date);
    html+=`<div class="cal-cell" onclick="${!isFuture&&!isWE?`openModal(${id},'${date}')`:'null'}"
      style="background:${sc?sc.bg:'var(--surface2)'};border:${date===todayStr?'1px solid #f59e0b':'1px solid transparent'};opacity:${isFuture||isWE?0.3:1};cursor:${!isFuture&&!isWE?'pointer':'default'};position:relative">
      <div style="font-size:9px;color:var(--text3)">${day}</div>
      ${sc?`<div style="font-size:8px;color:${sc.color};font-weight:700">${sc.label}</div>`:''}
      ${hasEv?'<div style="position:absolute;top:1px;right:1px;width:4px;height:4px;background:#3b82f6;border-radius:50%"></div>':''}
    </div>`;
  });
  html+='</div>';
  if(evs.length){
    html+=`<div style="font-size:12px;font-weight:700;color:var(--text2);margin:12px 0 6px">📅 아웃룩 이벤트 (${evs.length}건)</div>`;
    evs.forEach(e=>{const ec=STATUSES[e.type]||STATUSES.pending;html+=`<div class="m-event-item" style="margin-bottom:5px"><div class="m-event-dot" style="background:${ec.dot}"></div><span style="font-size:11px;color:var(--text2);margin-right:4px">${e.date}</span><span style="font-size:11px">${e.title}</span><span class="graph-tag" style="margin-left:auto">${ec.label}</span></div>`;});
  }
  html+='</div>';
  document.getElementById('memberDetailArea').innerHTML=html;
  setTimeout(()=>document.getElementById('memberDetailArea').scrollIntoView({behavior:'smooth',block:'start'}),50);
}

// ══════════════════════════
// CALENDAR VIEW
// ══════════════════════════
function buildCalendar(){
  const allEvs=[]; MEMBERS.forEach(m=>(graphEvents[m.id]||[]).forEach(e=>allEvs.push({...e,member:m.name,av:m.av})));
  allEvs.sort((a,b)=>a.date>b.date?1:-1);
  let html=`<div class="page-title">캘린더 연동</div><div class="page-sub">Graph API 아웃룩 이벤트</div>`;
  if(!allEvs.length){
    html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center">
      <div style="font-size:36px;margin-bottom:12px">📅</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">동기화된 이벤트 없음</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6">상단 ↻ 버튼으로 동기화하거나<br>데모 모드에서 확인하세요</div>
    </div>`;
  } else {
    html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">총 <strong style="color:var(--text)">${allEvs.length}건</strong></div>`;
    allEvs.forEach(e=>{const ec=STATUSES[e.type]||STATUSES.pending;html+=`<div class="ev-item"><div class="t-avatar">${e.av}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title}</div><div style="font-size:10px;color:var(--text2)">${e.member} · ${e.date}</div></div><span style="background:${ec.bg};color:${ec.color};border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;flex-shrink:0">${ec.label}</span></div>`;});
    html+='</div>';
  }
  html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px">📋 Azure AD 앱 등록 가이드</div>`;
  [['1. Azure Portal','portal.azure.com → Azure AD → 앱 등록'],['2. 앱 등록','이 페이지 URL을 리디렉션 URI에 입력'],['3. API 권한 추가','Calendars.Read, User.Read, User.ReadBasic.All'],['4. Client ID 복사','앱 개요 → 애플리케이션(클라이언트) ID']].forEach(([t,d])=>{
    html+=`<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:3px">${t}</div><div style="font-size:11px;color:var(--text2);line-height:1.5">${d}</div></div>`;
  });
  html+='</div>';
  return html;
}

// ══════════════════════════
// MODAL
// ══════════════════════════
function openModal(mid,date){
  const m=MEMBERS.find(x=>x.id===mid);
  editTarget={memberId:mid,date};
  document.getElementById('modalTitle').textContent=m.name;
  document.getElementById('modalDate').textContent=date;
  document.getElementById('noteInput').value=notes[`${mid}_${date}`]||'';
  const cur=records[mid]?.[date]||'pending';
  let html='';
  Object.entries(STATUSES).filter(([k])=>k!=='pending').forEach(([k,v])=>{
    html+=`<button class="status-opt ${cur===k?'selected':''}" id="opt_${k}"
      style="background:${cur===k?v.bg:'var(--surface2)'};border-color:${cur===k?v.color:'var(--border)'};color:${cur===k?v.color:'var(--text2)'}"
      onclick="selectStatus('${k}')">${v.label}</button>`;
  });
  document.getElementById('statusGrid').innerHTML=html;
  document.getElementById('editModal').classList.add('open');
}
function selectStatus(k){
  document.querySelectorAll('.status-opt').forEach(b=>{b.style.background='var(--surface2)';b.style.borderColor='var(--border)';b.style.color='var(--text2)';b.classList.remove('selected');});
  const sc=STATUSES[k], btn=document.getElementById(`opt_${k}`);
  btn.classList.add('selected'); btn.style.background=sc.bg; btn.style.borderColor=sc.color; btn.style.color=sc.color;
  editTarget.status=k;
}
function saveModal(){
  if(!editTarget)return;
  const{memberId,date,status}=editTarget;
  if(!status){showToast('⚠️ 상태를 선택해주세요');return;}
  if(!records[memberId])records[memberId]={};
  records[memberId][date]=status;
  const note=document.getElementById('noteInput').value.trim();
  if(note)notes[`${memberId}_${date}`]=note;
  closeModal(); showToast('✅ 저장되었습니다'); renderCurrentView();
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('editModal'))return;
  document.getElementById('editModal').classList.remove('open');
  editTarget=null;
}

window.addEventListener('load', handleRedirectOnLoad);

// ══════════════════════════
// TOAST
// ══════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none',2500);
}
